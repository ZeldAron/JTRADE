<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeldTrade Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --purple:   #7c3aed;
      --purple-l: #a78bfa;
      --green:    #3fb950;
      --red:      #f85149;
      --amber:    #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login ──────────────────────────────────────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 360px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo span {
      font-size: 22px;
      font-weight: 700;
      color: var(--purple-l);
      letter-spacing: -0.5px;
    }

    .login-logo small {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-field {
      margin-bottom: 14px;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .login-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-field input:focus { border-color: var(--purple); }

    .login-error {
      font-size: 12px;
      color: var(--red);
      margin-bottom: 12px;
      min-height: 16px;
    }

    .btn-primary {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    /* ── Dashboard ──────────────────────────────────────────────────────────── */
    #dashboard { display: none; }

    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--purple-l);
    }

    .admin-badge {
      background: var(--purple);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    .admin-user {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .admin-content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* ── Tabs ────────────────────────────────────────────────────────────────── */
    .admin-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .admin-tab {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }

    .admin-tab:hover { color: var(--text); }
    .tab-active { color: var(--purple-l) !important; border-bottom-color: var(--purple-l) !important; }

    /* ── Table ───────────────────────────────────────────────────────────────── */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }

    .admin-table th, .admin-table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .admin-table th {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .admin-table td { color: var(--text); }
    .admin-table tbody tr:hover { background: rgba(255,255,255,0.03); }

    .hash-cell {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .plan-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .plan-tag-pro   { background: rgba(124,58,237,0.2); color: var(--purple-l); }
    .plan-tag-basic { background: rgba(139,148,158,0.15); color: var(--muted); }

    .btn-gen {
      background: rgba(124,58,237,0.2);
      color: var(--purple-l);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 5px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-gen:hover { background: rgba(124,58,237,0.35); }

    .btn-revoke {
      background: rgba(248,81,73,0.1);
      color: var(--red);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 5px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-revoke:hover { background: rgba(248,81,73,0.2); }

    .admin-loading { color: var(--muted); padding: 20px 0; }
    .admin-empty   { color: var(--muted); padding: 20px 0; }

    /* ── Modale génération ───────────────────────────────────────────────────── */
    #adminModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 440px;
    }

    .modal-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .modal-card p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .gen-error { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 16px; }

    #genResult {
      display: none;
      margin-top: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    #genResult small {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    #genCode {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--purple-l);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-secondary {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 9px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    .btn-copy {
      background: rgba(63,185,80,0.15);
      color: var(--green);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .btn-copy:hover { background: rgba(63,185,80,0.25); }

    /* ── Toast ───────────────────────────────────────────────────────────────── */
    .admin-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
      pointer-events: none;
    }

    .admin-toast-ok  { background: var(--green); color: #fff; }
    .admin-toast-err { background: var(--red);   color: #fff; }
  </style>
</head>
<body>

  <!-- ── Login ──────────────────────────────────────────────────────────────── -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <span>ZeldTrade</span>
        <small>Console Admin</small>
      </div>
      <div class="login-field">
        <label>Email admin</label>
        <input type="email" id="loginEmail" value="zeldtradepro@gmail.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••">
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="btn-primary" id="btnLogin">Se connecter</button>
    </div>
  </div>

  <!-- ── Dashboard ──────────────────────────────────────────────────────────── -->
  <div id="dashboard">

    <header class="admin-header">
      <div class="admin-header-left">
        <span class="admin-brand">ZeldTrade</span>
        <span class="admin-badge">ADMIN</span>
      </div>
      <div class="admin-user">
        <span id="adminUserEmail"></span>
        <button class="btn-logout" id="btnLogout">Déconnexion</button>
      </div>
    </header>

    <main class="admin-content">

      <div class="admin-tabs">
        <button class="admin-tab tab-active" id="tab-users">Utilisateurs</button>
        <button class="admin-tab" id="tab-codes">Codes générés</button>
      </div>

      <!-- Onglet Utilisateurs -->
      <div id="tabUsers"></div>

      <!-- Onglet Codes -->
      <div id="tabCodes" style="display:none"></div>

    </main>
  </div>

  <!-- ── Modale génération de code ──────────────────────────────────────────── -->
  <div id="adminModal">
    <div class="modal-card">
      <h3 id="genModalTitle">Générer un code Pro</h3>
      <p>Un code unique sera généré et lié à cet utilisateur. <strong>Copie-le immédiatement</strong> — il ne sera plus affiché.</p>
      <input type="hidden" id="genTargetUid">
      <input type="hidden" id="genTargetEmail">

      <div class="modal-actions">
        <button class="btn-secondary" id="btnCloseModal">Annuler</button>
        <button class="btn-primary" id="btnDoGen" style="flex:2">Générer</button>
      </div>
      <div class="gen-error" id="genError"></div>

      <div id="genResult">
        <small>Code d'activation (usage unique)</small>
        <span id="genCode"></span>
        <button class="btn-copy" id="btnCopyCode">Copier le code</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────────────── -->
  <div class="admin-toast" id="adminToast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
