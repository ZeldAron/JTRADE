name: Release

# Se déclenche UNIQUEMENT quand tu pousses un tag (ex: git tag v0.5.1 && git push --tags)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # pour créer la Release GitHub
  pages: write      # pour déployer GitHub Pages
  id-token: write

jobs:
  deploy:
    name: Déployer sur GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Publier les fichiers src/
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      - name: Déployer GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Créer la Release GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `JTRADE ${tag}`,
              body: `## JTRADE ${tag}\n\nNouvelle version disponible sur https://zeldharon.github.io/JTRADE`,
              draft: false,
              prerelease: false,
            })
